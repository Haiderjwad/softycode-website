<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoftyCode | حلول برمجية وأنظمة ويب احترافية</title>
    <!-- Preload Critical Images -->
    <link rel="preload" href="/branding/softy-mascot.png" as="image" type="image/png" fetchpriority="high" />
    <link rel="preload" href="/branding/softylogo.png" as="image" type="image/png" fetchpriority="high" />
    <link rel="preload" href="/branding/softy name brand.png" as="image" type="image/png" fetchpriority="high" />
    <script>
      // منع الـ flash من الـ theme عند التحميل
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 
                        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          const isDark = theme === 'dark';
          document.documentElement.classList.toggle('dark', isDark);
          document.documentElement.classList.toggle('light', !isDark);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          console.error('Theme script error:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
